<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background parchment -->
  <rect width="400" height="300" fill="#F5EDE0"/>
  
  <!-- Decorative border -->
  <rect x="10" y="10" width="380" height="280" rx="8" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <rect x="20" y="20" width="360" height="260" rx="4" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="8 4"/>
  
  <!-- Scroll/parchment -->
  <rect x="80" y="50" width="240" height="200" rx="6" stroke="#4C1D95" stroke-width="3" fill="rgba(253,248,240,0.9)"/>
  
  <!-- Scroll rolls -->
  <ellipse cx="80" cy="60" rx="20" ry="30" stroke="#4C1D95" stroke-width="2.5" fill="rgba(196,181,253,0.4)"/>
  <ellipse cx="320" cy="60" rx="20" ry="30" stroke="#4C1D95" stroke-width="2.5" fill="rgba(196,181,253,0.4)"/>
  <ellipse cx="80" cy="240" rx="20" ry="20" stroke="#4C1D95" stroke-width="2.5" fill="rgba(196,181,253,0.4)"/>
  <ellipse cx="320" cy="240" rx="20" ry="20" stroke="#4C1D95" stroke-width="2.5" fill="rgba(196,181,253,0.4)"/>
  
  <!-- Text lines -->
  <line x1="110" y1="90" x2="290" y2="90" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="110" x2="280" y2="110" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="130" x2="270" y2="130" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="150" x2="260" y2="150" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="170" x2="250" y2="170" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  <line x1="110" y1="190" x2="240" y2="190" stroke="#6D28D9" stroke-width="2" opacity="0.6"/>
  
  <!-- Wax seal -->
  <circle cx="200" cy="230" r="25" fill="#B8860B" stroke="#8B6914" stroke-width="3"/>
  <circle cx="200" cy="230" r="18" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <text x="200" y="235" text-anchor="middle" fill="#2E1065" font-size="14" font-weight="bold" font-family="serif">210</text>
  
  <!-- Corner decorations -->
  <path d="M30 30 L50 30 L50 50" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M370 30 L350 30 L350 50" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M30 270 L50 270 L50 250" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M370 270 L350 270 L350 250" stroke="#D4AF37" stroke-width="3" fill="none"/>
  
  <!-- Decorative flourish -->
  <path d="M150 260 Q200 280 250 260" stroke="#D4AF37" stroke-width="2" fill="none"/>
  <path d="M160 265 Q200 275 240 265" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
</svg>