<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#F5EDE0"/>
  
  <!-- Decorative border -->
  <rect x="10" y="10" width="380" height="280" rx="8" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <rect x="20" y="20" width="360" height="260" rx="4" stroke="#C4B5FD" stroke-width="1.5" stroke-dasharray="8 4"/>
  
  <!-- Shield -->
  <path d="M200 40 L300 80 L300 180 Q300 240 200 270 Q100 240 100 180 L100 80 Z" 
        stroke="#4C1D95" stroke-width="4" fill="rgba(253,248,240,0.9)"/>
  
  <!-- Shield inner decoration -->
  <path d="M200 60 L280 90 L280 175 Q280 225 200 250 Q120 225 120 175 L120 90 Z" 
        stroke="#C4B5FD" stroke-width="2" fill="none" stroke-dasharray="6 3"/>
  
  <!-- Cross on shield -->
  <line x1="200" y1="80" x2="200" y2="220" stroke="#D4AF37" stroke-width="3"/>
  <line x1="150" y1="140" x2="250" y2="140" stroke="#D4AF37" stroke-width="3"/>
  
  <!-- Lock on shield -->
  <rect x="185" y="160" width="30" height="25" rx="4" stroke="#6D28D9" stroke-width="2.5" fill="rgba(196,181,253,0.4)"/>
  <path d="M192 160 L192 150 Q192 140 200 140 Q208 140 208 150 L208 160" 
        stroke="#6D28D9" stroke-width="2.5" fill="none"/>
  <circle cx="200" cy="172" r="4" fill="#D4AF37"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="70" r="8" fill="#D4AF37" stroke="#8B6914" stroke-width="2"/>
  <circle cx="150" cy="120" r="5" fill="#D4AF37"/>
  <circle cx="250" cy="120" r="5" fill="#D4AF37"/>
  <circle cx="150" cy="200" r="5" fill="#D4AF37"/>
  <circle cx="250" cy="200" r="5" fill="#D4AF37"/>
  
  <!-- Key beside shield -->
  <path d="M330 120 L370 120 L370 140 L360 140" stroke="#B8860B" stroke-width="3" fill="none"/>
  <circle cx="370" cy="130" r="8" stroke="#B8860B" stroke-width="3" fill="none"/>
  <line x1="360" y1="140" x2="360" y2="150" stroke="#B8860B" stroke-width="3"/>
  <line x1="360" y1="145" x2="355" y2="145" stroke="#B8860B" stroke-width="3"/>
  
  <!-- Corner decorations -->
  <path d="M30 30 L50 30 L50 50" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M370 30 L350 30 L350 50" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M30 270 L50 270 L50 250" stroke="#D4AF37" stroke-width="3" fill="none"/>
  <path d="M370 270 L350 270 L350 250" stroke="#D4AF37" stroke-width="3" fill="none"/>
  
  <!-- Title text -->
  <text x="200" y="290" text-anchor="middle" fill="#4C1D95" font-size="12" font-family="serif" font-style="italic">NIA 240 — Protección contra el Fraude</text>
</svg>