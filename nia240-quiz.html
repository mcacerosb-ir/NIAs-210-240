<script>
var qs={};
qs["240"]=[
{q:"1. ¿Cuál es la diferencia fundamental entre fraude y error?",o:["El fraude es más costoso que el error","El fraude es intencional, el error no es intencional","El fraude solo ocurre en grandes empresas","El error siempre es material"],a:1,exp:"La NIA 240 distingue que el fraude son actos intencionales, mientras que el error son declaraciones erróneas no intencionales."},
{q:"2. ¿Quién tiene la responsabilidad PRIMARIA para la prevención del fraude?",o:["El auditor externo","La dirección y los responsables del gobierno de la entidad","Los empleados de nivel medio","El comité de auditoría únicamente"],a:1,exp:"La responsabilidad primaria recae en la dirección y los responsables del gobierno corporativo."},
{q:"3. ¿Cuál es la responsabilidad principal del auditor respecto al fraude?",o:["Prevenir que ocurra el fraude","Obtener seguridad razonable de que los estados financieros están libres de incorrecciones materiales","Investigar todos los casos de fraude","Asegurar que no haya fraude"],a:1,exp:"El auditor debe obtener seguridad razonable de que los estados financieros están libres de incorrecciones materiales."},
{q:"4. ¿Qué actitud debe mantener el auditor durante toda la auditoría?",o:["Actitud pasiva","Actitud de escepticismo profesional","Actitud de confianza absoluta","Actitud indiferente"],a:1,exp:"La NIA 240 exige mantener escepticismo profesional durante toda la auditoría."},
{q:"5. ¿Cuáles son los dos tipos principales de fraude según la NIA 240?",o:["Fraude administrativo y fraude contable","Información financiera fraudulenta y apropiación indebida de activos","Fraude interno y fraude externo","Fraude pequeño y fraude grande"],a:1,exp:"La NIA 240 identifica información financiera fraudulenta y apropiación indebida de activos."},
{q:"6. ¿Qué debe evaluar el auditor en relación con los riesgos de fraude?",o:["Solo los riesgos a nivel de saldos de cuentas","Solo los riesgos a nivel de estados financieros","Riesgos a nivel de estados financieros Y a nivel de saldos de cuentas","No necesita evaluar riesgos de fraude"],a:2,exp:"El auditor debe evaluar riesgos tanto a nivel de estados financieros como de saldos."},
{q:"7. ¿Qué debe hacer la dirección para prevenir el fraude?",o:["Contratar más auditores externos","Establecer un entorno de control que promueva honestidad y ética","Eliminar todos los controles internos","Confiar únicamente en el auditor externo"],a:1,exp:"La dirección debe establecer un entorno de control que promueva honestidad y ética."},
{q:"8. ¿Qué significa 'información financiera fraudulenta'?",o:["Errores accidentales en los estados financieros","Manipulación deliberada de registros o representación errónea","La omisión de información no relevante","El uso de software contable inadecuado"],a:1,exp:"La información financiera fraudulenta implica manipulación deliberada de registros."},
{q:"9. ¿Qué debe hacer el auditor cuando identifica indicios de fraude?",o:["Ignorarlos si son pequeños","Comunicarlos a la dirección y, cuando sea apropiado, a los responsables del gobierno","Publicarlos en el informe de auditoría","Investigar el caso por su cuenta"],a:1,exp:"El auditor debe comunicar indicios de fraude a la dirección y al gobierno corporativo."},
{q:"10. ¿Qué es la 'apropiación indebida de activos'?",o:["La inversión inadecuada de recursos","El robo de activos de la entidad, como efectivo o inventario","La depreciación excesiva de activos","La compra de activos sin autorización"],a:1,exp:"La apropiación indebida de activos se refiere al robo de activos de la entidad."}
];
renderQuiz("240");
</script>
