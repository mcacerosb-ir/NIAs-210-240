<script>
var qs={};
qs["210"]=[
{q:"1. ¿Cuál es el objetivo principal de la NIA 210?",o:["Definir los procedimientos de auditoría","Aceptar o continuar un encargo solo cuando la base haya sido acordada","Establecer la materialidad","Evaluar los riesgos de fraude"],a:1,exp:"La NIA 210 establece que el objetivo es aceptar o continuar un encargo solo cuando la base haya sido acordada."},
{q:"2. ¿Con quién debe acordar el auditor los términos del encargo?",o:["Solo con el contador público","Con la dirección y, cuando sea apropiado, los responsables del gobierno","Con los empleados de la entidad","Con el auditor interno"],a:1,exp:"El auditor debe acordar los términos con la dirección y, cuando sea apropiado, con los responsables del gobierno corporativo."},
{q:"3. ¿Qué debe determinar el auditor sobre el marco de información financiera?",o:["Que sea el más económico","Que sea aceptable para la entidad","Que sea el más complejo posible","Que sea similar al de otras empresas"],a:1,exp:"El auditor debe determinar si el marco de información financiera aplicable es aceptable."},
{q:"4. ¿Cuál es una responsabilidad de la dirección según la NIA 210?",o:["Realizar las pruebas de auditoría","Preparar los estados financieros y proporcionar acceso a información","Emitir el informe de auditoría","Contratar al auditor externo"],a:1,exp:"La dirección tiene la responsabilidad de preparar estados financieros, establecer control interno y proporcionar acceso a información."},
{q:"5. ¿En qué forma deben documentarse los términos acordados?",o:["De forma verbal","En una carta de encargo u otra forma por escrito","En una presentación de PowerPoint","En una reunión informal"],a:1,exp:"Los términos deben registrarse en una carta de encargo u otra forma por escrito."},
{q:"6. ¿Qué debe hacer el auditor en auditorías recurrentes?",o:["Asumir que los términos anteriores siguen vigentes","Evaluar si las circunstancias requieren modificar los términos","Renovar el contrato automáticamente","Ignorar los cambios en la entidad"],a:1,exp:"En auditorías recurrentes, el auditor debe evaluar si las circunstancias requieren modificar los términos."},
{q:"7. ¿Qué ayuda a evitar la carta de encargo?",o:["Errores en los estados financieros","Malentendidos sobre el alcance y responsabilidades","El fraude financiero","Los conflictos laborales"],a:1,exp:"La carta de encargo ayuda a evitar malentendidos sobre el alcance y responsabilidades."},
{q:"8. ¿Qué debe reconocer la dirección al aceptar el encargo?",o:["Su derecho a interferir en la auditoría","Su responsabilidad por los estados financieros y el control interno","Su independencia del auditor","Su derecho a revisar el informe"],a:1,exp:"La dirección debe reconocer su responsabilidad por los estados financieros y el control interno."},
{q:"9. ¿Cuándo debe comunicar el auditor los cambios en los términos?",o:["Solo si el cliente lo solicita","Siempre que haya modificaciones significativas","Nunca, los términos son permanentes","Solo al final de la auditoría"],a:1,exp:"El auditor debe comunicar los cambios cuando haya modificaciones significativas."},
{q:"10. ¿Qué indica la NIA 210 sobre el acceso a información?",o:["El auditor debe solicitar acceso limitado","La dirección debe proporcionar acceso irrestricto a personas y documentación","El auditor solo puede acceder a estados financieros resumidos","La información debe ser proporcionada por el auditor interno"],a:1,exp:"La dirección debe proporcionar acceso irrestricto a toda la información relevante."}
];
